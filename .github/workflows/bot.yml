name: Daily IST Motivation Bot

on:
  schedule:
    # 02:30 UTC is 08:00 AM IST (Kolkata)
    - cron: '30 2 * * *'
  workflow_dispatch: 

jobs:
  send_quote:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Kolkata'
    steps:
      - name: Fetch Quote and Send
        run: |
          # 1. Fetch quote with -k (insecure) to skip SSL issues and -L for redirects
          # Try Quotable first
          QUOTE_DATA=$(curl -s -k -L --max-time 10 https://api.quotable.io/random?tags=inspirational)
          
          if [[ -n "$QUOTE_DATA" ]] && [[ "$QUOTE_DATA" != "null" ]]; then
            CONTENT=$(echo $QUOTE_DATA | jq -r '.content')
            AUTHOR=$(echo $QUOTE_DATA | jq -r '.author')
          else
            # Try ZenQuotes as a backup if Quotable fails
            QUOTE_DATA=$(curl -s -k -L --max-time 10 https://zenquotes.io/api/random)
            CONTENT=$(echo $QUOTE_DATA | jq -r '.[0].q')
            AUTHOR=$(echo $QUOTE_DATA | jq -r '.[0].a')
          fi

          # Final hardcoded fallback if both APIs fail
          if [[ -z "$CONTENT" ]] || [[ "$CONTENT" == "null" ]]; then
            CONTENT="The only way to do great work is to love what you do."
            AUTHOR="Steve Jobs"
          fi

          # 2. Get IST Time and Calculate Day Progress
          CURRENT_TIME=$(date +"%d %b %Y, %I:%M %p")
          HOUR=$(date +%-H)
          MIN=$(date +%-M)
          TOTAL_MINS=$(( (HOUR * 60) + MIN ))
          PERCENT=$(( (TOTAL_MINS * 100) / 1440 ))

          # 3. Generate Progress Bar (10 blocks)
          FILLED=$(( PERCENT / 10 ))
          [[ $FILLED -gt 10 ]] && FILLED=10
          EMPTY=$(( 10 - FILLED ))
          
          BAR_FILLED=$(printf '▓%.0s' $(seq 1 $FILLED 2>/dev/null))
          BAR_EMPTY=$(printf '░%.0s' $(seq 1 $EMPTY 2>/dev/null))
          BAR="${BAR_FILLED}${BAR_EMPTY}"

          # 4. Construct Final Message
          MESSAGE="✨ *Daily Motivation* ✨%0A%0A\"$CONTENT\"%0A— _$AUTHOR_%0A%0A🕒 *IST:* $CURRENT_TIME%0A📅 *Day Progress:* $PERCENT%25%0A$BAR"

          # 5. Send via Telegram Bot API using Secrets
          curl -s -k -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
