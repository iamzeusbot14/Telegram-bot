name: Z E U S Omni-Bot Pro

on:
  schedule:
    - cron: '30 2 * * *'  # 08:00 AM IST (Daily Morning Sync)
  workflow_dispatch: 

jobs:
  send_update:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Kolkata'
    steps:
      - name: System Pulse
        run: |
          # 1. Hindu Festival Check (2026 Dates)
          DATE_ISO=$(date +%Y-%m-%d)
          case "$DATE_ISO" in
            "2026-01-14") FESTIVAL="☀️ Happy Makar Sankranti!" ;;
            "2026-02-01") FESTIVAL="🪔 Happy Maha Shivratri!" ;;
            "2026-03-03") FESTIVAL="🎨 Happy Holi!" ;;
            "2026-03-20") FESTIVAL="🚩 Happy Ugadi / Gudi Padwa!" ;;
            "2026-03-26") FESTIVAL="🏹 Happy Ram Navami!" ;;
            "2026-08-16") FESTIVAL="🐍 Happy Janmashtami!" ;;
            "2026-08-28") FESTIVAL="🎀 Happy Raksha Bandhan!" ;;
            "2026-09-14") FESTIVAL="🐘 Happy Ganesh Chaturthi!" ;;
            "2026-10-11") FESTIVAL="🔱 Happy Dussehra!" ;;
            "2026-10-20") FESTIVAL="🪔 Happy Diwali!" ;;
            "2026-10-22") FESTIVAL="👫 Happy Bhai Dooj!" ;;
            *) FESTIVAL="" ;;
          esac
          
          WISH_MSG=""
          [[ -n "$FESTIVAL" ]] && WISH_MSG="🎊 <b>$FESTIVAL</b> 🎊%0A%0A"

          # 2. Quote Fetch
          for i in {1..3}; do
            QUOTE_RAW=$(curl -s -k -L --max-time 8 https://api.quotable.io/random?tags=inspirational)
            [[ -n "$QUOTE_RAW" && "$QUOTE_RAW" != "null" ]] && break || sleep 2
          done
          CONTENT=$(echo $QUOTE_RAW | jq -r '.content // "The best way to predict the future is to invent it."')
          AUTHOR=$(echo $QUOTE_RAW | jq -r '.author // "Alan Kay"')

          # 3. Precision Year Progress Calculation
          YEAR=$(date +%Y)
          D_O_Y=$(date +%-j)
          [[ $(($YEAR % 4)) -eq 0 && ($(($YEAR % 100)) -ne 0 || $(($YEAR % 400)) -eq 0) ]] && D_I_Y=366 || D_I_Y=365
          YEAR_PERC=$(( (D_O_Y * 100 + (D_I_Y / 2)) / D_I_Y ))

          # 4. Visual Bar Generation (15 chars)
          filled=$(( (YEAR_PERC * 15) / 100 ))
          empty=$(( 15 - filled ))
          YEAR_BAR=$(printf '▓%.0s' $(seq 1 $filled 2>/dev/null))$(printf '░%.0s' $(seq 1 $empty 2>/dev/null))

          # 5. Message Construction (Updated Header)
          DATESTAMP=$(date +"%d %b %Y")
          
          MESSAGE="${WISH_MSG}✨ <b>GOOD MORNING, Z E U S</b> ✨%0A%0A\"$CONTENT\"%0A— <b>$AUTHOR</b>%0A%0A📅 <b>$DATESTAMP</b>%0A%0A🌍 <b>Year Progress:</b> $YEAR_PERC%25%0A<code>$YEAR_BAR</code>%0A%0A🛠️ <b>Maintainer:</b> Z E U S"

          # 6. Push to Telegram
          curl -s -k -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"
