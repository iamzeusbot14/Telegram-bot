name: Z E U S Omni-Bot Pro

on:
  schedule:
    - cron: '30 2 * * *'  # 08:00 AM IST (Morning)
    - cron: '0 8 * * *'   # 01:30 PM IST (Afternoon)
    - cron: '0 12 * * *'  # 05:30 PM IST (Evening)
    - cron: '30 16 * * *' # 10:00 PM IST (Night)
  workflow_dispatch: 

jobs:
  send_update:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Kolkata'
    steps:
      - name: System Pulse
        run: |
          # 1. Festival Check
          YEAR=$(date +%Y)
          DATE_ISO=$(date +%Y-%m-%d)
          HOLIDAY_DATA=$(curl -s -k -L "https://date.nager.at/api/v3/PublicHolidays/$YEAR/IN")
          FESTIVAL=$(echo $HOLIDAY_DATA | jq -r ".[] | select(.date == \"$DATE_ISO\") | .localName")
          WISH_MSG=""
          [[ -n "$FESTIVAL" && "$FESTIVAL" != "null" ]] && WISH_MSG="🎊 <b>Happy $FESTIVAL!</b> 🎊%0A%0A"

          # 2. Quote Fetch (Reliability Loop)
          for i in {1..3}; do
            QUOTE_RAW=$(curl -s -k -L --max-time 8 https://api.quotable.io/random?tags=inspirational)
            [[ -n "$QUOTE_RAW" && "$QUOTE_RAW" != "null" ]] && break || sleep 2
          done
          CONTENT=$(echo $QUOTE_RAW | jq -r '.content // "The best way to predict the future is to invent it."')
          AUTHOR=$(echo $QUOTE_RAW | jq -r '.author // "Alan Kay"')

          # 3. Time-Based Logic (The "Pro" Switch)
          H=$(date +%-H)
          if [ $H -lt 11 ]; then
            HEADER="✨ GOOD MORNING, Z E U S ✨"
            STATUS="🌅 System Online | Fresh Start"
            ACTION="Time to dominate the day."
          elif [ $H -lt 16 ]; then
            HEADER="🔥 GOOD AFTERNOON, Z E U S 🔥"
            STATUS="☀️ Peak Performance | Keep Pushing"
            ACTION="Don't stop until you're proud."
          elif [ $H -lt 21 ]; then
            HEADER="🌆 GOOD EVENING, Z E U S 🌆"
            STATUS="🌙 Sunset Sync | Reviewing Progress"
            ACTION="Reflect on today's wins."
          else
            HEADER="🌌 GOOD NIGHT, Z E U S 🌌"
            STATUS="💤 Hibernation Mode | Sleep & Grow"
            ACTION="Rest up for tomorrow's battle."
          fi

          # 4. Precision Progress Calculation
          TOTAL_MINS=$(( ($(date +%-H) * 60) + $(date +%-M) ))
          DAY_PERC=$(( (TOTAL_MINS * 100 + 720) / 1440 ))
          
          D_O_Y=$(date +%-j)
          [[ $(($YEAR % 4)) -eq 0 && ($(($YEAR % 100)) -ne 0 || $(($YEAR % 400)) -eq 0) ]] && D_I_Y=366 || D_I_Y=365
          YEAR_PERC=$(( (D_O_Y * 100 + (D_I_Y / 2)) / D_I_Y ))

          # 5. Visual Bars
          gen_bar() {
            local p=$1
            local filled=$(( (p + 5) / 10 ))
            [[ $filled -gt 10 ]] && filled=10
            printf '▓%.0s' $(seq 1 $filled 2>/dev/null)
            printf '░%.0s' $(seq 1 $((10 - filled)) 2>/dev/null)
          }
          DAY_BAR=$(gen_bar $DAY_PERC)
          YEAR_BAR=$(gen_bar $YEAR_PERC)

          # 6. Interactive Message Build
          TIMESTAMP=$(date +"%I:%M %p")
          DATESTAMP=$(date +"%d %b %Y")
          
          MESSAGE="${WISH_MSG}<b>$HEADER</b>%0A<i>$STATUS</i>%0A%0A\"$CONTENT\"%0A— <b>$AUTHOR</b>%0A%0A🎯 <b>Focus:</b> $ACTION%0A%0A📅 <b>$DATESTAMP</b> | 🕒 <b>$TIMESTAMP</b>%0A%0A⏳ <b>Day:</b> $DAY_PERC%25%0A<code>$DAY_BAR</code>%0A%0A🌍 <b>Year:</b> $YEAR_PERC%25%0A<code>$YEAR_BAR</code>%0A%0A🛠️ <b>Maintainer:</b> Z E U S"

          # 7. Push to Telegram
          curl -s -k -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"
