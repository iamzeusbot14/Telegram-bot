name: Pro-Level Daily IST Motivation

on:
  schedule:
    # 02:30 UTC is 08:00 AM IST
    - cron: '30 2 * * *'
  workflow_dispatch: 

jobs:
  send_quote:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Kolkata'
    steps:
      - name: Execute Pro Workflow
        run: |
          # 1. Fetch Festivals (Indian Public Holidays)
          YEAR=$(date +%Y)
          DATE_ISO=$(date +%Y-%m-%d)
          HOLIDAY_DATA=$(curl -s -k -L "https://date.nager.at/api/v3/PublicHolidays/$YEAR/IN")
          FESTIVAL_NAME=$(echo $HOLIDAY_DATA | jq -r ".[] | select(.date == \"$DATE_ISO\") | .localName")
          WISH_MSG=""
          [[ -n "$FESTIVAL_NAME" && "$FESTIVAL_NAME" != "null" ]] && WISH_MSG="đźŽ‰ <b>Happy $FESTIVAL_NAME!</b> đźŽ‰%0A%0A"

          # 2. Fetch Motivation (With Retry Logic)
          FETCH_SUCCESS=false
          for i in {1..3}; do
            QUOTE_DATA=$(curl -s -k -L --max-time 10 https://api.quotable.io/random?tags=inspirational)
            if [[ -n "$QUOTE_DATA" && "$QUOTE_DATA" != "null" ]]; then
              CONTENT=$(echo $QUOTE_DATA | jq -r '.content')
              AUTHOR=$(echo $QUOTE_DATA | jq -r '.author')
              FETCH_SUCCESS=true && break
            fi
            sleep 5
          done

          if [ "$FETCH_SUCCESS" = false ]; then
            CONTENT="The only way to do great work is to love what you do."
            AUTHOR="Steve Jobs"
          fi

          # 3. High-Precision Math & Time Detection
          H=$(date +%-H)
          M=$(date +%-M)
          DAY_NAME=$(date +%A)
          TOTAL_MINS=$(( (H * 60) + M ))
          DAY_PERCENT=$(( (TOTAL_MINS * 100 + 720) / 1440 ))
          
          # Year Progress
          DAY_OF_YEAR=$(date +%-j)
          [[ $(($YEAR % 4)) -eq 0 && ($(($YEAR % 100)) -ne 0 || $(($YEAR % 400)) -eq 0) ]] && DAYS_IN_YEAR=366 || DAYS_IN_YEAR=365
          YEAR_PERCENT=$(( (DAY_OF_YEAR * 100 + (DAYS_IN_YEAR / 2)) / DAYS_IN_YEAR ))

          # 4. Pro Features: Dynamic Greeting & Day Vibe
          if [ $H -lt 12 ]; then GREET="Good Morning"; elif [ $H -lt 17 ]; then GREET="Good Afternoon"; else GREET="Good Evening"; fi
          
          case $DAY_NAME in
            Monday) VIBE="Let's Crush the Week!" ;;
            Friday) VIBE="Finish Strong, Weekend is near!" ;;
            Saturday|Sunday) VIBE="Recharge and Conquer!" ;;
            *) VIBE="Stay Focused, Stay Hungry!" ;;
          esac

          # 5. Progress Bars (10 Blocks)
          gen_bar() {
            local p=$1
            local filled=$(( (p + 5) / 10 ))
            [[ $filled -gt 10 ]] && filled=10
            local empty=$(( 10 - filled ))
            printf 'â–“%.0s' $(seq 1 $filled 2>/dev/null)
            printf 'â–‘%.0s' $(seq 1 $empty 2>/dev/null)
          }
          DAY_BAR=$(gen_bar $DAY_PERCENT)
          YEAR_BAR=$(gen_bar $YEAR_PERCENT)

          # 6. Construct Pro Message
          CURRENT_TIME=$(date +"%I:%M %p")
          CURRENT_DATE=$(date +"%d %b %Y")
          
          MESSAGE="${WISH_MSG}<b>âšˇ $GREET, Z E U S! âšˇ</b>%0A<i>$VIBE</i>%0A%0A\"$CONTENT\"%0Aâ€” <b>$AUTHOR</b>%0A%0Ađź“… <b>$CURRENT_DATE</b> | đź•’ <b>$CURRENT_TIME</b>%0A%0AđźŚ… <b>Day Progress:</b> $DAY_PERCENT%25%0A<code>$DAY_BAR</code>%0Ađź—“ď¸Ź <b>Year Progress:</b> $YEAR_PERCENT%25%0A<code>$YEAR_BAR</code>%0A%0Ađź‘¤ <i>Z E U S [iamdrzeus14@gmail.com]</i>"

          # 7. Final Push
          curl -s -k -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"
